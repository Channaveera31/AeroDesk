<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AeroDesk – Register</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"/>

  <!-- US005: Internal CSS -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --navy:        #0a0f1e;
      --teal:        #008080;
      --teal-bright: #00c4a7;
      --teal-glow:   rgba(0,196,167,0.12);
      --white:       #ffffff;
      --off-white:   #e8eef7;
      --muted:       #7a8ba0;
      --danger:      #ff5c6a;
      --success:     #22c97a;
      --glass-bg:    rgba(255,255,255,0.04);
      --glass-border:rgba(255,255,255,0.10);
      --shadow-card: 0 24px 64px rgba(0,0,0,0.5);
      --radius-lg:   18px;
      --radius-md:   12px;
      --radius-sm:   8px;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    /* US005: background-color = teal */
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: teal; /* US005 */
      background: linear-gradient(135deg, #0a0f1e 0%, #0d2020 60%, #081818 100%);
      color: var(--white);
      min-height: 100vh;
      display: flex;          /* US005: align center */
      align-items: flex-start;
      justify-content: center;
      padding: 48px 20px;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 20% 25%, rgba(0,128,128,0.2) 0%, transparent 55%),
        radial-gradient(ellipse 55% 45% at 80% 75%, rgba(0,196,167,0.1) 0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }

    /* US005: div – font-color black → we use off-white for dark theme readability
       font-face Arial → DM Sans (modern equivalent)
       background-color Gray94 → dark glass card
       border-radius, box-shadow, padding 20px */
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 640px;
      background: rgba(21,30,48,0.85); /* dark equivalent of Gray94 */
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg); /* US005: border-radius */
      box-shadow: var(--shadow-card);  /* US005: box-shadow */
      backdrop-filter: blur(20px);
      padding: 20px 36px 32px; /* US005: padding 20px */
      animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
      color: var(--off-white); /* US005: font-color (adapted for dark bg) */
      font-family: 'DM Sans', sans-serif; /* US005: font-face */
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(28px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* Card header */
    .card-header {
      text-align: center;
      padding-bottom: 24px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--glass-border);
    }

    .brand-logo {
      font-size: 2rem;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 12px rgba(0,196,167,0.5));
    }

    .brand-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--white);
      margin-bottom: 4px;
    }

    .brand-title span { color: var(--teal-bright); }

    .card-subtitle {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    /* Form grid */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-grid .full { grid-column: 1 / -1; }

    .field-group { display: flex; flex-direction: column; gap: 5px; }

    .field-group label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .field-group input,
    .field-group textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .field-group input::placeholder,
    .field-group textarea::placeholder { color: var(--muted); }

    .field-group input:focus,
    .field-group textarea:focus {
      border-color: var(--teal-bright);
      background: rgba(0,196,167,0.05);
      box-shadow: 0 0 0 3px rgba(0,196,167,0.1);
    }

    .field-group textarea { resize: vertical; min-height: 78px; line-height: 1.5; }

    /* Field errors – red (US006) */
    .field-error {
      color: var(--danger);
      font-size: 0.74rem;
      font-weight: 500;
      min-height: 14px;
    }

    /* Button row */
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    /* US005: Register button – bg Dodger blue, font white, hover Cobalt */
    .btn-register {
      flex: 1;
      height: 50px;
      background: DodgerBlue; /* US005 */
      color: white;           /* US005 */
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      letter-spacing: 0.4px;
      transition: background 0.25s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 20px rgba(30,144,255,0.3);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    /* US005: hover = Cobalt */
    .btn-register:hover {
      background: #1560BD; /* Cobalt */
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(21,96,189,0.4);
    }

    .btn-reset {
      height: 50px;
      padding: 0 24px;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 500;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      display: flex; align-items: center; gap: 8px;
    }

    .btn-reset:hover {
      background: rgba(255,255,255,0.08);
      color: var(--white);
    }

    /* Acknowledgement screen (US004) */
    #ackScreen { display: none; text-align: center; }

    .ack-icon {
      font-size: 3.5rem;
      margin-bottom: 12px;
      animation: popIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes popIn {
      from { opacity:0; transform:scale(0.6); }
      to   { opacity:1; transform:scale(1); }
    }

    .ack-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--white);
      margin-bottom: 6px;
    }

    /* US004: success message in green */
    .success-msg {
      color: var(--success); /* green (US004) */
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 28px;
    }

    .ack-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      text-align: left;
      margin-bottom: 28px;
    }

    .ack-field {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
    }

    .ack-field-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .ack-field-value {
      font-size: 0.92rem;
      color: var(--teal-bright);
      font-weight: 600;
      word-break: break-all;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: DodgerBlue;
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 13px 32px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.25s, transform 0.2s;
      box-shadow: 0 6px 20px rgba(30,144,255,0.3);
    }

    .btn-back:hover { background: #1560BD; transform: translateY(-1px); }
  </style>
</head>
<body>

<div class="card">

  <!-- REGISTRATION FORM (US004) -->
  <div id="regForm">
    <div class="card-header">
      <div class="brand-logo">✈</div>
      <h2 class="brand-title">Aero<span>Desk</span></h2>
      <p class="card-subtitle">Passenger Registration</p>
    </div>

    <form id="registrationForm" novalidate>
      <div class="form-grid">

        <div class="field-group">
          <label for="firstName">First Name *</label>
          <input type="text" id="firstName" placeholder="First Name" maxlength="50"/>
          <span class="field-error" id="err-firstName"></span>
        </div>

        <div class="field-group">
          <label for="lastName">Last Name *</label>
          <input type="text" id="lastName" placeholder="Last Name" maxlength="50"/>
          <span class="field-error" id="err-lastName"></span>
        </div>

        <div class="field-group">
          <label for="dob">Date of Birth *</label>
          <input type="date" id="dob"/>
          <span class="field-error" id="err-dob"></span>
        </div>

        <div class="field-group">
          <label for="contact">Contact Number *</label>
          <input type="text" id="contact" placeholder="10-digit number" maxlength="10"/>
          <span class="field-error" id="err-contact"></span>
        </div>

        <div class="field-group full">
          <label for="email">Email ID *</label>
          <input type="email" id="email" placeholder="you@example.com"/>
          <span class="field-error" id="err-email"></span>
        </div>

        <div class="field-group full">
          <label for="address">Address *</label>
          <textarea id="address" placeholder="Street, City, State..." maxlength="100"></textarea>
          <span class="field-error" id="err-address"></span>
        </div>

      </div>

      <div class="btn-row">
        <button type="submit" class="btn-register">
          <i class='bx bx-check-circle'></i> Register
        </button>
        <button type="button" class="btn-reset" id="resetBtn">
          <i class='bx bx-reset'></i> Reset
        </button>
      </div>
    </form>
  </div>

  <!-- ACKNOWLEDGEMENT SCREEN (US004) -->
  <div id="ackScreen">
    <div class="ack-icon">✅</div>
    <h2 class="ack-title">Registration Complete!</h2>
    <!-- US004: success message in green -->
    <p class="success-msg">Passenger Registration is successful.</p>

    <div class="ack-grid">
      <div class="ack-field">
        <div class="ack-field-label">Passenger ID</div>
        <div class="ack-field-value" id="ackPassengerId"></div>
      </div>
      <div class="ack-field">
        <div class="ack-field-label">Generated Password</div>
        <div class="ack-field-value" id="ackPassword"></div>
      </div>
      <div class="ack-field">
        <div class="ack-field-label">First Name</div>
        <div class="ack-field-value" id="ackFirstName"></div>
      </div>
      <div class="ack-field">
        <div class="ack-field-label">Last Name</div>
        <div class="ack-field-value" id="ackLastName"></div>
      </div>
      <div class="ack-field">
        <div class="ack-field-label">Date of Birth</div>
        <div class="ack-field-value" id="ackDob"></div>
      </div>
      <div class="ack-field">
        <div class="ack-field-label">Contact</div>
        <div class="ack-field-value" id="ackContact"></div>
      </div>
      <div class="ack-field full" style="grid-column:1/-1">
        <div class="ack-field-label">Email</div>
        <div class="ack-field-value" id="ackEmail"></div>
      </div>
    </div>

    <button class="btn-back" onclick="window.location.href='index.html'">
      <i class='bx bx-arrow-back'></i> Back to Login
    </button>
  </div>

</div>

<!-- US006: External JS -->
<script src="register.js"></script>
</body>
</html>
