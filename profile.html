<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AeroDesk – My Profile</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    .profile-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px 64px;
      position: relative; z-index:1;
    }

    .profile-card {
      background: rgba(21,30,48,0.9);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 40px 44px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .profile-top {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 36px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--glass-border);
    }

    .avatar {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--teal), var(--teal-bright));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 0 24px rgba(0,196,167,0.35);
      flex-shrink: 0;
    }

    .profile-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--white);
      margin-bottom: 4px;
    }

    .profile-id {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .profile-id span {
      color: var(--teal-bright);
      font-weight: 600;
    }

    /* Fields grid */
    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }

    .fields-grid .full { grid-column: 1 / -1; }

    .view-field { display: flex; flex-direction: column; gap: 5px; }

    .view-field-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .view-field-value {
      font-size: 0.92rem;
      color: var(--off-white);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      min-height: 44px;
    }

    .edit-input {
      display: none;
      width: 100%;
      background: rgba(0,196,167,0.05);
      border: 1px solid var(--teal-bright);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      outline: none;
      box-shadow: 0 0 0 3px rgba(0,196,167,0.1);
    }

    /* Action buttons */
    .action-row { display: flex; gap: 12px; align-items: center; }

    .btn-edit {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--teal-glow);
      color: var(--teal-bright);
      border: 1px solid rgba(0,196,167,0.25);
      border-radius: var(--radius-sm);
      padding: 12px 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-edit:hover {
      background: var(--teal-bright);
      color: var(--navy);
    }

    .btn-save {
      display: none;
      align-items: center; gap: 8px;
      background: linear-gradient(135deg, var(--teal), var(--teal-bright));
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 12px 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,196,167,0.3);
      transition: filter 0.2s, transform 0.2s;
    }

    .btn-save:hover { filter: brightness(1.1); transform: translateY(-1px); }

    .save-msg {
      display: none;
      font-size: 0.82rem;
      color: var(--success);
      font-weight: 600;
      display: none;
      align-items: center; gap: 6px;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="home.html" class="navbar-brand">
    <div class="brand-icon">✈</div>
    <span class="brand-name">Aero<span>Desk</span></span>
  </a>
  <ul class="nav-links">
    <li><a href="home.html"><i class='bx bx-home-alt'></i> Home</a></li>
    <li><a href="profile.html" class="active"><i class='bx bx-user-circle'></i> My Profile</a></li>
    <li class="dropdown">
      <a href="#" class="dropdown-toggle"><i class='bx bx-trip'></i> My Trips</a>
      <div class="dropdown-menu">
        <a href="upcoming.html"><i class='bx bx-takeoff'></i> Upcoming</a>
        <a href="cancelled.html"><i class='bx bx-x-circle'></i> Cancelled</a>
        <a href="completed.html"><i class='bx bx-check-circle'></i> Completed</a>
      </div>
    </li>
    <li><a href="index.html" onclick="sessionStorage.clear()"><i class='bx bx-log-out'></i> Logout</a></li>
  </ul>
  <div class="nav-welcome" id="welcomeMsg">Welcome</div>
</nav>

<div class="profile-wrap">
  <div class="profile-card fade-up">

    <div class="profile-top">
      <div class="avatar">👤</div>
      <div>
        <div class="profile-name" id="profileDisplayName">—</div>
        <div class="profile-id">Passenger ID: <span id="profileId">—</span></div>
      </div>
    </div>

    <div class="fields-grid">
      <div class="view-field">
        <div class="view-field-label">First Name</div>
        <div class="view-field-value" id="v-firstName">—</div>
        <input class="edit-input" id="e-firstName" type="text" maxlength="50"/>
      </div>
      <div class="view-field">
        <div class="view-field-label">Last Name</div>
        <div class="view-field-value" id="v-lastName">—</div>
        <input class="edit-input" id="e-lastName" type="text" maxlength="50"/>
      </div>
      <div class="view-field">
        <div class="view-field-label">Date of Birth</div>
        <div class="view-field-value" id="v-dob">—</div>
        <input class="edit-input" id="e-dob" type="date"/>
      </div>
      <div class="view-field">
        <div class="view-field-label">Contact Number</div>
        <div class="view-field-value" id="v-contact">—</div>
        <input class="edit-input" id="e-contact" type="text" maxlength="10"/>
      </div>
      <div class="view-field full">
        <div class="view-field-label">Email ID</div>
        <div class="view-field-value" id="v-email">—</div>
        <input class="edit-input" id="e-email" type="email"/>
      </div>
      <div class="view-field full">
        <div class="view-field-label">Address</div>
        <div class="view-field-value" id="v-address">—</div>
        <input class="edit-input" id="e-address" type="text" maxlength="100"/>
      </div>
    </div>

    <div class="action-row">
      <button class="btn-edit" id="editBtn" onclick="enableEdit()">
        <i class='bx bx-edit'></i> Edit Profile
      </button>
      <button class="btn-save" id="saveBtn" onclick="saveProfile()">
        <i class='bx bx-save'></i> Save Changes
      </button>
      <span class="save-msg" id="saveMsg"><i class='bx bx-check-circle'></i> Profile updated!</span>
    </div>

  </div>
</div>

<script>
  const name = sessionStorage.getItem("passengerName") || "Passenger";
  document.getElementById("welcomeMsg").innerHTML = "Welcome <strong>" + name + "</strong> !!!";

  let data = JSON.parse(sessionStorage.getItem("passengerData") || "{}");

  function loadProfile() {
    document.getElementById("profileDisplayName").textContent =
      (data.firstName || "") + " " + (data.lastName || "");
    document.getElementById("profileId").textContent    = data.passengerId || "N/A";
    document.getElementById("v-firstName").textContent  = data.firstName   || "—";
    document.getElementById("v-lastName").textContent   = data.lastName    || "—";
    document.getElementById("v-dob").textContent        = data.dob         || "—";
    document.getElementById("v-email").textContent      = data.email       || "—";
    document.getElementById("v-address").textContent    = data.address     || "—";
    document.getElementById("v-contact").textContent    = data.contact     || "—";
  }

  function enableEdit() {
    ["firstName","lastName","dob","email","address","contact"].forEach(f => {
      document.getElementById("v-" + f).style.display = "none";
      const inp = document.getElementById("e-" + f);
      inp.value = data[f] || "";
      inp.style.display = "block";
    });
    document.getElementById("editBtn").style.display  = "none";
    document.getElementById("saveBtn").style.display  = "inline-flex";
    document.getElementById("saveMsg").style.display  = "none";
  }

  function saveProfile() {
    ["firstName","lastName","dob","email","address","contact"].forEach(f => {
      data[f] = document.getElementById("e-" + f).value.trim();
      document.getElementById("v-" + f).style.display = "";
      document.getElementById("e-" + f).style.display = "none";
    });
    sessionStorage.setItem("passengerData", JSON.stringify(data));
    sessionStorage.setItem("passengerName", data.firstName + " " + data.lastName);
    document.getElementById("welcomeMsg").innerHTML = "Welcome <strong>" + data.firstName + " " + data.lastName + "</strong> !!!";
    document.getElementById("editBtn").style.display = "inline-flex";
    document.getElementById("saveBtn").style.display = "none";
    document.getElementById("saveMsg").style.display = "inline-flex";
    loadProfile();
  }

  loadProfile();
</script>
</body>
</html>
